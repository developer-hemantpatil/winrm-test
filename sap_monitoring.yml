---
- name: Run SAP Monitoring with Cleanup and Full Logs
  hosts: all
  gather_facts: no

  vars:
    python_exe: "C:\\Users\\hemant.patil.adm\\AppData\\Local\\Programs\\Python\\Python311-32\\python.exe"
    script_path: "C:\\GXO_SAP\\run_all_env.py"
    downloads_dir: "C:\\GXO_SAP\\downloads"

  tasks:
    - name: Remove downloads directory (mandatory cleanup)
      ansible.windows.win_file:
        path: "{{ downloads_dir }}"
        state: absent
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"

    - name: Recreate empty downloads directory
      ansible.windows.win_file:
        path: "{{ downloads_dir }}"
        state: directory
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"

    - name: Execute script with 15‑minute timeout
      ansible.windows.win_command:
        cmd: '"{{ python_exe }}" "{{ script_path }}"'
        chdir: "C:\\GXO_SAP"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: result
      failed_when: false
      timeout: 900
    - name: Show script stdout (full)
      ansible.builtin.debug:
        var: result.stdout_lines

    - name: Show script stderr (if any)
      ansible.builtin.debug:
        var: result.stderr_lines
      when: result.stderr_lines | length > 0

    - name: Fail only if script had an unexpected error (exit code not 0 or 1)
      ansible.builtin.fail:
        msg: "Script exited with code {{ result.rc }}. Check logs above."
      when: result.rc != 0 and result.rc != 1
