---
- name: Execute SAP Automation on Remote Windows Server (Interactive Session)
  hosts: all
  gather_facts: no
  vars:
    scripts_dir: "C:\\GXO_SAP"
    python_exe: "C:\\Users\\hemant.patil.adm\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"
    sap_gui_path: "C:\\Program Files (x86)\\SAP\\FrontEnd\\SAPGUI\\saplogon.exe"
    max_com_wait: 60

  tasks:
    # -----------------------------------------------------------------
    # 1. Kill any existing SAP Logon processes (ignore if none found)
    # -----------------------------------------------------------------
    - name: Stop existing SAP Logon processes (if any)
      ansible.windows.win_shell: |
        $processes = Get-Process -Name "saplogon" -ErrorAction SilentlyContinue
        if ($processes) {
          $processes | Stop-Process -Force
          Write-Host "Killed existing SAP Logon processes."
        } else {
          Write-Host "No existing SAP Logon processes found."
        }
      register: kill_result
      changed_when: "'Killed existing' in kill_result.stdout"

    - name: Wait a moment after killing (if any were killed)
      ansible.builtin.pause:
        seconds: 3
      when: kill_result is changed

    # -----------------------------------------------------------------
    # 2. Start SAP Logon fresh in the interactive session (using runas)
    # -----------------------------------------------------------------
    - name: Start SAP Logon in interactive session
      ansible.windows.win_command:
        cmd: "start \"\" \"{{ sap_gui_path }}\""
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: sap_start

    - name: Wait for SAP GUI COM server to become available
      ansible.windows.win_shell: |
        $max = {{ max_com_wait }}
        $start = Get-Date
        while ((Get-Date) - $start -lt (New-TimeSpan -Seconds $max)) {
          try {
            $com = [System.Runtime.InteropServices.Marshal]::GetActiveObject("SAPGUI")
            if ($com) {
              Write-Host "SAP GUI COM object is ready."
              exit 0
            }
          } catch {
            Start-Sleep -Seconds 2
          }
        }
        Write-Host "Timeout waiting for SAP GUI COM object."
        exit 1
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: com_check
      until: com_check.rc == 0
      retries: 3
      delay: 10

    - name: Fail if COM object never became available
      ansible.builtin.fail:
        msg: "SAP GUI COM object not available after {{ max_com_wait }} seconds. Ensure user is logged into desktop and scripting is enabled."
      when: com_check.rc != 0

    # -----------------------------------------------------------------
    # 3. Run clean_downloads.py
    # -----------------------------------------------------------------
    - name: Run clean_downloads.py
      ansible.windows.win_command:
        cmd: "{{ python_exe }} {{ scripts_dir }}\\clean_downloads.py"
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: clean_output
      failed_when: false

    - name: Show stdout of clean_downloads
      ansible.builtin.debug:
        msg: "{{ clean_output.stdout_lines }}"
      when: clean_output.stdout_lines | length > 0

    - name: Show stderr of clean_downloads
      ansible.builtin.debug:
        msg: "{{ clean_output.stderr_lines }}"
      when: clean_output.stderr_lines | length > 0

    # -----------------------------------------------------------------
    # 4. Run main SAP monitoring script
    # -----------------------------------------------------------------
    - name: Run main SAP monitoring script
      ansible.windows.win_command:
        cmd: "{{ python_exe }} {{ scripts_dir }}\\run_all_env.py"
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: main_output
      failed_when: false

    - name: Show stdout of run_all_env
      ansible.builtin.debug:
        msg: "{{ main_output.stdout_lines }}"
      when: main_output.stdout_lines | length > 0

    - name: Show stderr of run_all_env
      ansible.builtin.debug:
        msg: "{{ main_output.stderr_lines }}"
      when: main_output.stderr_lines | length > 0

    - name: Fail playbook if main script returned non‑zero exit code
      ansible.builtin.fail:
        msg: "run_all_env.py exited with code {{ main_output.rc }}"
      when: main_output.rc != 0
