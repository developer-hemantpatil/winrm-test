---
- name: SAP Monitoring Automation – Remote Windows Host (GXO)
  hosts: 10.19.1.67         # Replace with your inventory group or host name
  gather_facts: yes
  vars:
    scripts_dir: "C:\\GXO_SAP"
    # Full path to Python executable on the remote host
    python_exe: "C:\\Users\\hemant.patil.adm\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

  tasks:
    - name: Ensure scripts directory exists on remote host
      ansible.windows.win_file:
        path: "{{ scripts_dir }}"
        state: directory

    - name: Copy all Python scripts and config to remote host
      ansible.windows.win_copy:
        src: "{{ item }}"
        dest: "{{ scripts_dir }}\\"
      loop:
        - clean_downloads.py
        - run_all_env.py
        - servicenow_client.py
        - email_sender.py
        - report_generator.py
        - parsers.py
        - tcode_executor.py
        - sap_login.py
        - utils.py
        - config.json
      tags: [copy]

    - name: Clean downloads folder before run
      ansible.windows.win_command:
        cmd: "{{ python_exe }} {{ scripts_dir }}\\clean_downloads.py"
        chdir: "{{ scripts_dir }}"
      register: clean_output
      failed_when: false
      tags: [cleanup]

    - name: Show cleanup output
      ansible.builtin.debug:
        msg: "{{ clean_output.stdout_lines }}"
      when: clean_output.stdout_lines | length > 0
      tags: [cleanup]

    - name: Execute main SAP monitoring (all tcodes, report, email, incidents)
      ansible.windows.win_command:
        cmd: "{{ python_exe }} {{ scripts_dir }}\\run_all_env.py"
        chdir: "{{ scripts_dir }}"
      register: main_output
      failed_when: false
      # Optional: pass credentials as environment variables (if not using config.json)
      # environment:
      #   SAP_USERNAME: "{{ sap_username }}"
      #   SAP_PASSWORD: "{{ sap_password }}"
      tags: [main]

    - name: Display main script stdout
      ansible.builtin.debug:
        msg: "{{ main_output.stdout_lines }}"
      when: main_output.stdout_lines | length > 0
      tags: [main]

    - name: Display main script stderr (if any)
      ansible.builtin.debug:
        msg: "{{ main_output.stderr_lines }}"
      when: main_output.stderr_lines | length > 0
      tags: [main]

    - name: Fail playbook if main script returned an error
      ansible.builtin.fail:
        msg: "run_all_env.py exited with code {{ main_output.rc }}"
      when: main_output.rc != 0
      tags: [main]