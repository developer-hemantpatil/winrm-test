---
- name: Execute SAP Automation on Remote Windows Server (Interactive Session)
  hosts: all              # Matches the host name in your inventory
  gather_facts: no
  vars:
    scripts_dir: "C:\\GXO_SAP"
    python_exe: "C:\\Users\\hemant.patil.adm\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

  tasks:
    - name: Run clean_downloads.py in interactive session
      ansible.windows.win_shell: |
        "{{ python_exe }}" "{{ scripts_dir }}\\clean_downloads.py"
      args:
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"               # Uses the WinRM user from inventory
      vars:
        ansible_become_password: "{{ ansible_password }}"  # Also from inventory
      register: clean_output
      failed_when: false

    - name: Show stdout of clean_downloads
      ansible.builtin.debug:
        msg: "{{ clean_output.stdout_lines }}"
      when: clean_output.stdout_lines | length > 0

    - name: Show stderr of clean_downloads (if any)
      ansible.builtin.debug:
        msg: "{{ clean_output.stderr_lines }}"
      when: clean_output.stderr_lines | length > 0

    - name: Run main SAP monitoring script in interactive session
      ansible.windows.win_shell: |
        "{{ python_exe }}" "{{ scripts_dir }}\\run_all_env.py"
      args:
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: main_output
      failed_when: false

    - name: Show stdout of run_all_env
      ansible.builtin.debug:
        msg: "{{ main_output.stdout_lines }}"
      when: main_output.stdout_lines | length > 0

    - name: Show stderr of run_all_env
      ansible.builtin.debug:
        msg: "{{ main_output.stderr_lines }}"
      when: main_output.stderr_lines | length > 0

    - name: Fail playbook if main script returned a non‑zero exit code
      ansible.builtin.fail:
        msg: "run_all_env.py exited with code {{ main_output.rc }}"
      when: main_output.rc != 0
