---
- name: Execute SAP Monitoring on Windows Server
  hosts: all
  gather_facts: no

  vars:
    python_exe: "C:\\Users\\hemant.patil.adm\\AppData\\Local\\Programs\\Python\\Python311-32\\python.exe"
    scripts_dir: "C:\\GXO_SAP"

  tasks:
    - name: Run clean_downloads.py
      ansible.windows.win_command:
        cmd: '"{{ python_exe }}" "{{ scripts_dir }}\\clean_downloads.py"'
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: clean_result
      failed_when: false

    - name: Show clean_downloads output
      ansible.builtin.debug:
        msg: "{{ clean_result.stdout_lines }}"
      when: clean_result.stdout_lines | length > 0

    - name: Show clean_downloads errors (if any)
      ansible.builtin.debug:
        msg: "{{ clean_result.stderr_lines }}"
      when: clean_result.stderr_lines | length > 0

    - name: Run main SAP monitoring script
      ansible.windows.win_command:
        cmd: '"{{ python_exe }}" "{{ scripts_dir }}\\run_all_env.py"'
        chdir: "{{ scripts_dir }}"
      become: yes
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"
      register: main_result
      failed_when: false

    - name: Show main script stdout
      ansible.builtin.debug:
        msg: "{{ main_result.stdout_lines }}"
      when: main_result.stdout_lines | length > 0

    - name: Show main script stderr
      ansible.builtin.debug:
        msg: "{{ main_result.stderr_lines }}"
      when: main_result.stderr_lines | length > 0

    - name: Fail if main script returned non‑zero exit code
      ansible.builtin.fail:
        msg: "run_all_env.py exited with code {{ main_result.rc }}"
      when: main_result.rc != 0
